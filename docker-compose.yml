volumes:
  postgres-data:

services:
  farms:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_DATABASE__HOST: db
      APP_DATABASE__USERNAME: postgres
      APP_DATABASE__PASSWORD: password
      APP_DATABASE__REQUIRE_SSL: false
      APP_REDIS_URL: "redis://redis:6379"
    ports:
      - "8000:8000"

  db:
    image: postgres:18-alpine
    restart: always
    # Tests leak idle connections (pools dropped on test-runtime shutdown
    # can't run their async close); reap them server-side and give the
    # parallel suite headroom.
    command: postgres -c max_connections=200 -c idle_session_timeout=5s
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: farms
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER" ]
      interval: 1s
      timeout: 5s
      retries: 5
    volumes:
      # postgres:18 stores data in a major-version subdirectory and expects the
      # volume mounted at /var/lib/postgresql (not /.../data), otherwise it
      # refuses to start. See docker-library/postgres#37.
      - postgres-data:/var/lib/postgresql

  redis:
    image: valkey/valkey:9-alpine
    ports:
      - "6379:6379"