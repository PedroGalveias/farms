global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'farms-cluster'
    environment: 'development'

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'localhost:9090' ]
  
  # Scrape OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: [ 'otel-collector:8888' ]  # Collector's own metrics
        labels:
          service: 'otel-collector'
  
  # Scrape application metrics from OTEL Collector
  - job_name: 'farms-service'
    static_configs:
      - targets: [ 'otel-collector:8889' ]  # Prometheus exporter endpoint
        labels:
          service: 'farms-service'
