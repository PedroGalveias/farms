name: Build and Push to GHCR then Deploy on Render

# Deploy only from release tags — never from a main push. Pushing to main used
# to build a `latest` image, publish it to GHCR and trigger a Render deploy on
# every merge; now a package is built and Render is deployed ONLY for a tagged
# release (v*). main is still fully validated by general.yml (fmt/clippy/tests);
# it just no longer ships. `workflow_dispatch` keeps a manual escape hatch.
on:
  workflow_dispatch:
  push:
    tags:
      - v*

concurrency:
  group: render
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: 'Build and Push Container Image'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image metadata (tags + labels)
      # On branch push:  latest
      # On tag push:     latest + release tag (e.g. ghcr.io/org/repo:v0.3.1)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag,enable=${{ github.ref_type == 'tag' }}

      # Build and push the image — layer cache is stored in the registry itself
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  deployment:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: render
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install the Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install sqlx-cli
        uses: baptiste0928/cargo-install@v3
        with:
          crate: sqlx-cli
          version: "0.9.0"
          features: "rustls,postgres"
          args: --no-default-features

      - name: Run DB migrations on DB
        env:
          RENDER_API_BASE_URL: "https://api.render.com/v1"
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: python scripts/render_db_migrate.py

      - name: Trigger deploy to Render
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl "$deploy_url"

