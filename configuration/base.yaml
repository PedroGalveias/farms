application:
  host: 127.0.0.1
  port: 8000
database:
  max_connections: 100 # default
  timeout_seconds: 5
  port: 5432
  database_name: "farms"
  require_ssl: false
  username: "postgres"
  password: "password"
  host: "127.0.0.1"
idempotency:
  engine: "redis"
  ttl_seconds: 600 # 10 min
  redis_key_prefix: "idem"
  cleanup_worker_run_interval: 60 # 1 hour
redis:
  uri: "redis://127.0.0.1:6379"
  pool_max_size: 20
  timeout_seconds: 5
  session_key_prefix: "sess"
session:
  secret_key: "replace-me-with-a-long-random-local-secret"
  cookie_name: "farms-session"
  cookie_secure: false
  cookie_http_only: true
  cookie_same_site: "lax"
  ttl_seconds: 86400
logging:
  level: "info"
  format: "bunyan" # Options: pretty, bunyan
telemetry:
  enabled: false
  service_name: "farms-service"
  endpoint: "http://localhost:4317" #OTLP gRPC endpoint
  environment: "local"
  protocol: "grpc"
email_client:
  # Default to the 'log' backend: emails are written to the application log
  # instead of being sent, so local development needs no real provider. The
  # verification link appears in the logs. Production overrides this to
  # 'mailjet' for real delivery via the Mailjet Send API.
  engine: "log"
  base_url: "http://localhost:8025"
  sender_email: "no-reply@farms.local"
  api_key: "local-dev-key"
  secret_key: "local-dev-secret"
  timeout_milliseconds: 10000
registration:
  verification_token_ttl_seconds: 86400 # 24h
  verification_base_url: "http://127.0.0.1:8000"
  rate_limit:
    max_requests: 5
    window_seconds: 3600 # 1h
