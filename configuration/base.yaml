application:
  host: 127.0.0.1
  base_url: "http://127.0.0.1"
  port: 8000
database:
  max_connections: 100 # default
  timeout_seconds: 5
  port: 5432
  database_name: "farms"
  require_ssl: false
  username: "postgres"
  password: "password"
  host: "127.0.0.1"
idempotency:
  engine: "redis"
  ttl_seconds: 600 # 10 min
  redis_key_prefix: "idem"
redis:
  uri: "redis://127.0.0.1:6379"
  pool_max_size: 20
  timeout_seconds: 5
  session_key_prefix: "sess"
session:
  secret_key: "replace-me-with-a-long-random-local-secret"
  cookie_name: "farms-session"
  cookie_secure: false
  cookie_http_only: true
  cookie_same_site: "lax"
  ttl_seconds: 86400
logging:
  level: "info"
  format: "bunyan" # Options: pretty, bunyan
telemetry:
  enabled: false
  service_name: "farms-service"
  endpoint: "http://localhost:4317" #OTLP gRPC endpoint
  environment: "local"

